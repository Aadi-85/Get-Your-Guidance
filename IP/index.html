<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css">
    
    <style>
        
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 900;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- Add your existing body content here -->
    <header>
        <nav>
            <div class="logo">
                <a href="#">Get Your Guidance</a>
            </div>
            <input type="checkbox" id="click">
            <label for="click" class="mainicon">
                <div class="menu">
                    <i class="bi bi-list"></i>
                </div>
            </label>
            <ul>
                <li><a href="main.html" class="active">Home</a></li>
                <li><a href="career.html">Careers</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="signin.html" id="login" >Login</a></li>
                <li><a href="signup.html">Sign up</a></li>
            </ul>
        </nav>
    </header>
    
   

    <!-- Login popup -->
    <div id="loginPopup" class="popup">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <h2>Login</h2>
        <!-- Add your login form or content here -->
        <form>
            <!-- Your login form fields go here -->
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br>
            <input type="submit" value="Login">
        </form>
    </div>

    <!-- Overlay for the popup -->
    <div id="overlay" class="overlay" onclick="closePopup()"></div>

    <!-- Add your existing script tag and mainicon click event here -->
    <footer>
        <p>Connect with us:</p>
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/aaditya-kumar-6a7656282/" class="headb" target="_blank"> <img src="https://static-00.iconduck.com/assets.00/linkedin-icon-1024x1024-net2o24e.png"> </a>
            <a href="https://x.com/AbhayKoundal9?t=4SM7Ythsj4EcBCtlyLRQQQ&s=09"  class="headb" target="_blank"><img id="twitter" src="https://img.freepik.com/free-vector/new-2023-twitter-logo-x-icon-design_1017-45418.jpg?size=338&ext=jpg&ga=GA1.1.1448711260.1707091200&semt=ais"></a>
            <a href="https://www.instagram.com/aman_razput07" class="headb"  target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png"></a>
        </div>
        <p>&copy; 2024 Career Guidance Hub. All rights reserved.</p>
    </footer>
    <script>
        
        function openPopup() {
            document.getElementById("loginPopup").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        
        function closePopup() {
            document.getElementById("loginPopup").style.display = "none";
            document.getElementById("overlay").style.display = "none";
        }

        
        document.getElementById("login").addEventListener("click", openPopup);
    </script>
</body>
</html>
